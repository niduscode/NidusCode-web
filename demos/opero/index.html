<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OperoEducator — Iniciar sesión</title>
<script src="tailwind.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  .brand-grad { background: linear-gradient(45deg, #f97316, #fbbf24); }
  .brand-text { color: #f97316; }
  .brand-bg { background: #f97316; }
  .accent-bg { background: #fbbf24; }
  input:focus { box-shadow: 0 0 0 4px rgba(249,115,22,.15); border-color: #fb923c; outline: none; }
</style>
</head>
<body class="bg-slate-50">

<div class="flex min-h-screen items-center justify-center p-4">
  <div class="w-full max-w-[400px] flex flex-col items-center">

    <div class="bg-white rounded-[2.5rem] p-8 md:p-10 shadow-2xl shadow-slate-200/50 w-full flex flex-col items-center">
      <div class="w-16 h-16 brand-grad rounded-2xl flex items-center justify-center shadow-lg shadow-orange-500/30 mb-5">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" class="text-slate-900">
          <path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72l5 2.73 5-2.73v3.72z"/>
        </svg>
      </div>
      <h1 class="text-2xl tracking-tight text-slate-900 mb-8">
        <span class="font-light">Opero</span><span class="font-bold">Educator</span>
      </h1>
      <form class="w-full space-y-4" onsubmit="event.preventDefault(); login();">
        <input id="user" type="text" placeholder="Usuario"
          class="w-full bg-white p-4 rounded-2xl border border-slate-200 text-slate-900 text-sm placeholder:text-slate-400" autocomplete="off">
        <div class="relative">
          <input id="pass" type="password" placeholder="Contraseña"
            class="w-full bg-white p-4 pr-12 rounded-2xl border border-slate-200 text-slate-900 text-sm placeholder:text-slate-400">
          <button type="button" onclick="togglePass()" class="absolute right-3 top-1/2 -translate-y-1/2 p-1.5 rounded-lg text-slate-400 hover:text-slate-700 hover:bg-slate-100" aria-label="Mostrar contraseña">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div id="msg" class="hidden p-3 bg-rose-50 text-rose-600 border border-rose-100 rounded-xl text-xs font-bold text-center"></div>
        <div class="pt-2">
          <button type="submit" class="w-full !py-4 text-base font-bold rounded-2xl brand-bg text-white shadow-lg shadow-orange-500/40 hover:shadow-orange-500/60 transition-shadow">
            Entrar al Sistema
          </button>
        </div>
      </form>
      <div class="mt-8">
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Nube Conectada</p>
      </div>
    </div>

    <div class="mt-5 w-full bg-white rounded-3xl border border-orange-200 shadow-lg shadow-orange-100/40 p-5">
      <div class="flex items-center gap-2 mb-3">
        <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-orange-50 border border-orange-200 text-[10px] font-bold uppercase tracking-widest text-orange-600">
          <span class="w-1.5 h-1.5 rounded-full brand-bg animate-pulse"></span>
          Modo demo
        </span>
        <p class="text-[11px] text-slate-500">Elige un rol para entrar sin contraseña</p>
      </div>
      <div class="grid grid-cols-1 gap-2">
        <button onclick="enterAs('director')" class="text-left p-3 rounded-2xl border border-slate-200 hover:border-orange-300 hover:bg-orange-50/40 transition-all group">
          <div class="flex items-center justify-between">
            <div>
              <div class="text-sm font-bold text-slate-900">Director 📈</div>
              <div class="text-[11px] text-slate-500">Visión global · 5 sucursales · reasignar instructores</div>
            </div>
            <span class="text-orange-500 group-hover:translate-x-1 transition-transform">→</span>
          </div>
        </button>
        <button onclick="enterAs('admin')" class="text-left p-3 rounded-2xl border border-slate-200 hover:border-orange-300 hover:bg-orange-50/40 transition-all group">
          <div class="flex items-center justify-between">
            <div>
              <div class="text-sm font-bold text-slate-900">Admin 💰</div>
              <div class="text-[11px] text-slate-500">Pagos de alumnos · morosidad · conciliación bancaria</div>
            </div>
            <span class="text-orange-500 group-hover:translate-x-1 transition-transform">→</span>
          </div>
        </button>
        <button onclick="enterAs('instructor')" class="text-left p-3 rounded-2xl border border-slate-200 hover:border-orange-300 hover:bg-orange-50/40 transition-all group">
          <div class="flex items-center justify-between">
            <div>
              <div class="text-sm font-bold text-slate-900">Instructor 👋</div>
              <div class="text-[11px] text-slate-500">Aula virtual · asistencias · alumnos de tu sucursal</div>
            </div>
            <span class="text-orange-500 group-hover:translate-x-1 transition-transform">→</span>
          </div>
        </button>
      </div>
    </div>

  </div>
</div>

<script>
  function togglePass(){ const p = document.getElementById('pass'); p.type = p.type === 'password' ? 'text' : 'password'; }
  function login(){
    const u = (document.getElementById('user').value || '').toLowerCase().trim();
    let role = 'instructor';
    if (u.startsWith('director')) role = 'director';
    else if (u.startsWith('admin')) role = 'admin';
    if (!u) { const m = document.getElementById('msg'); m.textContent = 'Escribe un usuario o usa el modo demo de abajo.'; m.classList.remove('hidden'); return; }
    enterAs(role);
  }
  function enterAs(role){ sessionStorage.setItem('opero-demo-role', role); location.href = role + '.html'; }
</script>

<script src="../demo-mode.js" defer></script>
</body>
</html>
